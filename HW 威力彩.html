    <script>
        const rand = (min, max) => {
            return Math.round(Math.random() * (max - min)) + min
        }

        const groupA = []

        // 第三種
        // 建立 1 ~ 38 的數字陣列
        // const numbers = []
        // for (let i = 1; i <= 38; i++) {
        //   numbers.push(i)
        // }
        // Array.from() 將類似陣列的東西變陣列
        const numbers = Array.from({ length: 38 }, (value, index) => {
            return index + 1
        })
        // 取 6 次
        for (let i = 0; i < 6; i++) {
            // 隨機取一個數字陣列的索引
            const index = rand(0, numbers.length - 1)
            // 將取到的索引對應的數字放入陣列
            groupA.push(numbers[index])
            // 將取到的數字從陣列裡面移除
            numbers.splice(index, 1)
        }

        document.write(groupA)
    </script>
